version: "3.9"

services:
  natalia_bot:
    build: .
    container_name: natalia_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persistente Daten ausserhalb des Containers
      - ./data:/app/data
      - ./logs:/app/logs
      - ./media:/app/media
      - ./content:/app/content
    # Optional: Ressourcen begrenzen
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    #       cpus: "0.5"
